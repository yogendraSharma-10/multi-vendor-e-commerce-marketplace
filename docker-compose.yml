```yaml
# docker-compose.yml
#
# This file defines the services, networks, and volumes for the multi-vendor
# e-commerce marketplace application. It is designed for both local development
# and can be adapted for production deployments.
#
# To run:
#   docker-compose up --build -d
#
# To stop:
#   docker-compose down
#
version: '3.8'

services:
  # --------------------------------------------------------------------------
  # API Server (Node.js Backend)
  # --------------------------------------------------------------------------
  # Handles business logic, data processing, and serves the REST API.
  api:
    container_name: marketplace_api
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    volumes:
      # Mounts the host's server directory into the container for live code changes.
      # For production, you would typically remove this volume and rely on the
      # code copied during the image build.
      - ./server:/usr/src/app
      # Use an anonymous volume to prevent the host's node_modules from overwriting
      # the container's, which might have different dependencies.
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Client (React Frontend)
  # --------------------------------------------------------------------------
  # The customer-facing web application built with React.
  # This service runs the React development server for features like hot-reloading.
  client:
    container_name: marketplace_client
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mounts the host's client directory for live code changes.
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      # Necessary for hot-reloading to work correctly inside a Docker container.
      - CHOKIDAR_USEPOLLING=true
      # Prevents a known issue with Webpack Dev Server and proxies.
      - WDS_SOCKET_PORT=0
    stdin_open: true # For interactive mode in development
    tty: true
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Admin Panel (PHP Application)
  # --------------------------------------------------------------------------
  # A dedicated PHP-FPM service to process PHP code for the admin panel.
  # It does not expose any ports directly; Nginx will forward requests to it.
  admin-php:
    container_name: marketplace_admin_php
    build:
      context: ./admin-panel
      dockerfile: Dockerfile # This Dockerfile should be based on a php-fpm image
    restart: unless-stopped
    volumes:
      # Mounts the admin panel source code.
      - ./admin-panel:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Web Server (Nginx)
  # --------------------------------------------------------------------------
  # Acts as a reverse proxy, directing traffic to the appropriate service.
  # - Requests to `/api/*` are forwarded to the Node.js API server.
  # - Requests for the admin panel are passed to the PHP-FPM service.
  # - All other requests are proxied to the React development server.
  # In a production setup, Nginx would also serve the static build of the React app.
  nginx:
    container_name: marketplace_nginx
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Mounts the custom Nginx configuration.
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      # Nginx needs access to the PHP files to pass them to PHP-FPM.
      - ./admin-panel:/var/www/html
    depends_on:
      - api
      - client
      - admin-php
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Database (PostgreSQL)
  # --------------------------------------------------------------------------
  # The primary database for the application.
  db:
    container_name: marketplace_db
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-marketplace}
    volumes:
      # Persists database data across container restarts.
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Exposes the database port to the host machine for direct access if needed.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

# --------------------------------------------------------------------------
# Networks and Volumes
# --------------------------------------------------------------------------
# Defines the shared network for inter-service communication and the
# named volume for database persistence.

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
```